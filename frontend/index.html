<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Quality Prediction</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Air Quality Prediction & Health Recommendation</h1>

        <div class="card">
            <h2>Input Air Pollutants</h2>
            <form id="aqiForm">
                <div class="form-row">
                    <label for="pm25">PM2.5</label>
                    <input type="number" id="pm25" name="pm25" step="0.1" required />
                </div>
                <div class="form-row">
                    <label for="pm10">PM10</label>
                    <input type="number" id="pm10" name="pm10" step="0.1" required />
                </div>
                <div class="form-row">
                    <label for="no2">NO2</label>
                    <input type="number" id="no2" name="no2" step="0.1" required />
                </div>
                <div class="form-row">
                    <label for="so2">SO2</label>
                    <input type="number" id="so2" name="so2" step="0.1" required />
                </div>
                <div class="form-row">
                    <label for="co">CO</label>
                    <input type="number" id="co" name="co" step="0.01" required />
                </div>

                <button type="submit" id="predictBtn">Predict AQI</button>
            </form>

            <div id="loader" class="loader" style="display: none;">Loading...</div>
            <div id="result" class="result"></div>
            <div id="error" class="error"></div>
        </div>

        <div class="card">
            <h2>Model Comparison</h2>
            <div id="modelComparison" class="metrics">Loading model metrics...</div>
        </div>

        <div class="card">
            <h2>AQI Visualization</h2>
            <canvas id="aqiChart"></canvas>
        </div>

        <div class="card">
            <h2>Feature Importance (Random Forest)</h2>
            <img id="featureImg" src="http://127.0.0.1:5000/feature_importance.png" alt="Feature Importance Plot" style="max-width:100%; display:none;">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
